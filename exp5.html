<!DOCTYPE html>
<html>
<head>
    <title>Exercise 1 - Scientific Calculator Menu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .menu {
            margin-top: 20px;
        }

        .calculator {
            display: none;
            margin-top: 20px;
        }

        input[type="text"] {
            width: 260px;
            height: 40px;
            font-size: 18px;
            text-align: right;
        }

        button {
            width: 60px;
            height: 40px;
            margin: 3px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2>Exercise 1 - Main Menu</h2>

    <div class="menu">
        <button onclick="showCalculator()">Scientific Calculator</button>
    </div>

    <div class="calculator" id="calculator">
        <h3>Scientific Calculator</h3>
        <input type="text" id="display" readonly><br><br>

        <!-- Basic Numbers -->
        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('/')">÷</button><br>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('*')">×</button><br>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('-')">−</button><br>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="append('+')">+</button><br>

        <!-- Scientific Functions -->
        <button onclick="scientific('sin')">sin</button>
        <button onclick="scientific('cos')">cos</button>
        <button onclick="scientific('tan')">tan</button>
        <button onclick="scientific('log')">log</button><br>

        <button onclick="scientific('sqrt')">√</button>
        <button onclick="append('**')">xʸ</button>
        <button onclick="append(Math.PI)">π</button>
        <button onclick="clearDisplay()">C</button>
    </div>

<script>
    function showCalculator() {
        document.getElementById("calculator").style.display = "block";
    }

    function append(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function calculate() {
        try {
            document.getElementById("display").value =
                eval(document.getElementById("display").value);
        } catch {
            alert("Invalid Expression");
        }
    }

    function scientific(func) {
        let value = parseFloat(document.getElementById("display").value);
        let result;

        switch(func) {
            case 'sin': result = Math.sin(value); break;
            case 'cos': result = Math.cos(value); break;
            case 'tan': result = Math.tan(value); break;
            case 'log': result = Math.log10(value); break;
            case 'sqrt': result = Math.sqrt(value); break;
        }

        document.getElementById("display").value = result;
    }
</script>

</body>
</html>
