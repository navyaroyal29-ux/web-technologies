<!DOCTYPE html>
<html>
<head>
<title>Registration and Login Form</title>

<style>
body{
font-family: Arial;
background-color:#f2f2f2;
text-align:center;
}

.container{
width:350px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
margin-top:30px;
}

input{
width:90%;
padding:8px;
margin:8px 0;
}

button{
padding:10px 20px;
background-color:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background-color:#45a049;
}

hr{
margin:40px;
}
</style>

<script>

function validateRegistration(){

var name=document.getElementById("name").value;
var email=document.getElementById("email").value;
var password=document.getElementById("password").value;
var phone=document.getElementById("phone").value;

if(name==""){
alert("Name cannot be empty");
return false;
}

var emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(!email.match(emailPattern)){
alert("Enter valid Email");
return false;
}

if(password.length<6){
alert("Password must be at least 6 characters");
return false;
}

if(phone.length!=10 || isNaN(phone)){
alert("Enter valid 10 digit phone number");
return false;
}

alert("Registration Successful!");
return true;

}


function validateLogin(){

var email=document.getElementById("loginEmail").value;
var password=document.getElementById("loginPassword").value;

if(email==""){
alert("Enter Email");
return false;
}

if(password==""){
alert("Enter Password");
return false;
}

alert("Login Successful!");
return true;

}

</script>

</head>

<body>

<div class="container">
<h2>Registration Form</h2>

<form onsubmit="return validateRegistration()">

<input type="text" id="name" placeholder="Enter Name"><br>

<input type="text" id="email" placeholder="Enter Email"><br>

<input type="password" id="password" placeholder="Enter Password"><br>

<input type="text" id="phone" placeholder="Enter Phone Number"><br>

<button type="submit">Register</button>

</form>
</div>

<hr>

<div class="container">
<h2>Login Form</h2>

<form onsubmit="return validateLogin()">

<input type="text" id="loginEmail" placeholder="Enter Email"><br>

<input type="password" id="loginPassword" placeholder="Enter Password"><br>

<button type="submit">Login</button>

</form>
</div>

</body>
</html>
