<!DOCTYPE html>
<html>
<head>
    <title>Form Validation</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f7fa;
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .box {
            text-align: center;
        }

        /* 🔥 BIG IMAGES */
        .box img {
            width: 450px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .box img:hover {
            transform: scale(1.05);
        }

        /* 📱 Mobile */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
            }

            .box img {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <h1>Form Validation</h1>

    <div class="container">

        <div class="box">
            <h3>Register Form</h3>
            <img src="img/register-form.png" alt="Register">
        </div>

        <div class="box">
            <h3>Validation Form</h3>
            <img src="img/form-validation.png" alt="Login">
        </div>

    </div>

</body>
</html>
