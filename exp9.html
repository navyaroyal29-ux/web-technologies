<!DOCTYPE html>
<html>
<head>
    <title>Experiment 9</title>
    <style>
        body {
            background: #f5f7fa;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            color: #333;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 420px; /* bigger card */
        }

        .card h3 {
            margin-bottom: 20px;
            color: #444;
        }

        .images {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .images img {
            width: 180px; /* bigger images */
            border-radius: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .images img:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        /* 🔽 Mobile View */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                align-items: center;
                margin: 20px;
            }

            .card {
                width: 90%;
            }

            .images {
                flex-direction: column;
                align-items: center;
            }

            .images img {
                width: 90%; /* full width on mobile */
            }
        }
    </style>
</head>
<body>

    <h1>Register & Login</h1>

    <div class="container">

        <div class="card">
            <h3>Register</h3>
            <div class="images">
                <img src="img/register.png" alt="Register">
                <img src="img/Register-validation.png" alt="Register Validation">
            </div>
        </div>

        <div class="card">
            <h3>Login</h3>
            <div class="images">
                <img src="img/login.png" alt="Login">
                <img src="img/login-validation.png" alt="Login Validation">
            </div>
        </div>

    </div>

</body>
</html>
